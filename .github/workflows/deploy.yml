name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Create native build output directory
        run: mkdir -p native/out

      - name: Build XZ Utils (liblzma for WASM)
        run: ./native/build-xz.sh

      - name: Build xdelta3 WASM module
        run: ./native/build.sh

      - name: Build xdelta3 Node.js test module
        run: ./native/build-test.sh

      - name: Install xdelta3 CLI (for generating test fixtures)
        run: sudo apt-get install -y xdelta3

      - name: Test xdelta3 WASM patch functionality
        run: npm run test:wasm

      - name: Build React frontend
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
